name: Update Bangs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update bangs
        run: node scripts/update-bangs.mjs

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code bang.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true' && env.ACT != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update bangs from DuckDuckGo"
          title: "Update bangs list from DuckDuckGo"
          body: |
            Automated update of the bangs list from https://duckduckgo.com/bang.js

            This PR was automatically created by the scheduled workflow.
          branch: update-bangs
          delete-branch: true

      - name: Local test summary
        if: steps.git-check.outputs.changed == 'true' && env.ACT == 'true'
        run: |
          echo "::notice::Running in act - PR creation skipped"
          echo "Changes detected in bang.js:"
          git diff --stat bang.js
