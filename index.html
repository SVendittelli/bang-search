<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bang Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body>
    <div class="center">
      <div class="container">
        <h1>Bang Search</h1>
        <p>Resolve DuckDuckGo's bang searches locally, for speed.</p>
        <div class="url-container">
          <input
            id="url"
            class="url"
            type="test"
            value="https://search.vendittelli.co.uk/?q=%s"
            readonly
          />
          <button id="copy">Copy</button>
        </div>
      </div>

      <footer>
        <a
          href="https://github.com/SVendittelli/bang-search"
          target="_blank"
          rel="noopener noreferrer"
        >
          GitHub
        </a>
      </footer>
    </div>
    <script src="scripts/main.mjs" type="module"></script>
  </body>
</html>
